<style>
:root{--bg:#0b0d11;--surface:#13161e;--surface2:#1a1e2a;--surface3:#222738;--accent:#10b981;--accent2:#06b6d4;--gold:#f59e0b;--red:#ef4444;--purple:#a78bfa;--text:#edf0f7;--muted:#8390a5;--border:#252a3a;--green-dim:rgba(16,185,129,0.1);--blue-dim:rgba(6,182,212,0.1);--gold-dim:rgba(245,158,11,0.1);--red-dim:rgba(239,68,68,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{position:sticky;top:0;z-index:100;background:rgba(11,13,17,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:20px}
.topbar h1{font-size:1rem;font-weight:700;white-space:nowrap}
.topbar h1 span{color:var(--accent)}
.filter-pills{display:flex;gap:6px;flex:1;overflow-x:auto}
.filter-pills::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Sora',sans-serif;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.pill:hover{color:var(--text);border-color:var(--text)}
.pill.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.pill.plumbing.active{background:#10b981;color:#000;border-color:#10b981}

.pill.pest.active{background:#a78bfa;color:#000;border-color:#a78bfa}

.container{max-width:1100px;margin:0 auto;padding:28px 24px 80px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:20px;overflow:hidden;transition:border-color 0.2s}
.card:hover{border-color:rgba(16,185,129,0.3)}
.card.priority-a{border-left:4px solid var(--accent)}
.card.priority-b{border-left:4px solid var(--gold)}
.card.priority-c{border-left:4px solid var(--muted)}

.card-top{padding:24px 28px;cursor:pointer;display:flex;gap:20px;align-items:flex-start}
.card-top:hover{background:rgba(255,255,255,0.01)}

.card-priority{font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:600;padding:4px 10px;border-radius:6px;flex-shrink:0;margin-top:2px}
.priority-a .card-priority{background:var(--green-dim);color:var(--accent)}
.priority-b .card-priority{background:var(--gold-dim);color:var(--gold)}
.priority-c .card-priority{background:rgba(131,144,165,0.1);color:var(--muted)}

.card-main{flex:1;min-width:0}
.card-main h2{font-size:1.15rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card-main h2 .ind-tag{font-size:0.62rem;font-weight:600;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:0.5px}
.ind-plumbing{background:var(--green-dim);color:var(--accent)}
.ind-hvac{background:var(--blue-dim);color:var(--accent2)}
.ind-pest{background:rgba(167,139,250,0.12);color:var(--purple)}

.card-meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:8px}
.meta-item{font-size:0.82rem;color:var(--muted);display:flex;align-items:center;gap:5px}
.meta-item strong{color:var(--text);font-weight:600}
.meta-item .star{color:var(--gold)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.call-btn{background:var(--accent);color:#000;padding:8px 20px;border-radius:8px;font-family:'Sora',sans-serif;font-size:0.82rem;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:all 0.15s;display:inline-block}
.call-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.arrow{color:var(--muted);font-size:1.2rem;transition:transform 0.3s}
.card.open .arrow{transform:rotate(180deg)}

.card-body{display:none;border-top:1px solid var(--border)}
.card.open .card-body{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.body-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.body-section{padding:24px 28px;border-bottom:1px solid var(--border)}
.body-section:nth-child(odd){border-right:1px solid var(--border)}
.body-section h3{font-family:'JetBrains Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:14px}

.info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:0.85rem}
.info-row .lbl{color:var(--muted)}
.info-row .val{font-weight:500;text-align:right}

.rundown{padding:24px 28px;border-bottom:1px solid var(--border);grid-column:1/-1}
.rundown h3{font-family:'JetBrains Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:14px}
.rundown p{font-size:0.88rem;line-height:1.7;color:var(--text)}

.questions-section{padding:24px 28px;grid-column:1/-1;border-bottom:1px solid var(--border)}

.q-list{display:flex;flex-direction:column;gap:8px}
.q-item{background:var(--surface2);border-radius:8px;padding:12px 16px;font-size:0.85rem;line-height:1.5;display:flex;gap:10px}
.q-item .num{font-family:'JetBrains Mono',monospace;color:var(--accent2);font-weight:600;flex-shrink:0}

.opener-section{padding:24px 28px;grid-column:1/-1;background:var(--surface2)}
.opener-section h3{font-family:'JetBrains Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:14px}
.opener-box{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:18px 22px;font-size:0.9rem;line-height:1.7;position:relative}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.65rem;transition:all 0.15s}
.copy-btn:hover{color:var(--accent);border-color:var(--accent)}

.status-row{padding:16px 28px;background:var(--surface2);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.status-row label{font-size:0.78rem;color:var(--muted);font-weight:500}
.status-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-family:'Sora',sans-serif;font-size:0.82rem;outline:none}
.notes-input{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-family:'Sora',sans-serif;font-size:0.82rem;outline:none}
.notes-input::placeholder{color:#4a5060}

@media(max-width:768px){
  .body-grid{grid-template-columns:1fr}
  .body-section:nth-child(odd){border-right:none}
  .card-top{flex-direction:column;gap:12px}
  .card-right{flex-direction:row;align-items:center}
  .card-meta{gap:12px}
}
</style>

function renderCards(filter) {
  const container = document.getElementById('cardContainer');
  let filtered = companies;
  if (filter === 'plumbing' || filter === 'hvac' || filter === 'pest') {
    filtered = companies.filter(c => c.industry === filter);
  } else if (filter === 'a' || filter === 'b') {
    filtered = companies.filter(c => c.priority === filter);
  }

  const aCount = filtered.filter(c => c.priority === 'a').length;
  document.getElementById('countLabel').textContent = filter === 'all'
    ? `${companies.filter(c=>c.priority==='a').length} Priority A targets`
    : `${filtered.length} companies shown`;

  container.innerHTML = filtered.map(c => `
    <div class="card priority-${c.priority}" data-ind="${c.industry}" data-pri="${c.priority}">
      <div class="card-top" onclick="this.parentElement.classList.toggle('open')">
        <span class="card-priority">${c.priority.toUpperCase()}</span>
        <div class="card-main">
          <h2>${c.name} <span class="ind-tag ind-${c.industry}">${c.industry}</span></h2>
          <div class="card-meta">
            <span class="meta-item"><span class="star">★</span> <strong>${c.rating}</strong> (${c.reviews.toLocaleString()} reviews)</span>
            <span class="meta-item">👤 <strong>${c.owner}</strong></span>
            <span class="meta-item">🕐 ${c.hours}</span>
          </div>
        </div>
        <div class="card-right">
          <a class="call-btn" href="tel:${c.phone.replace(/\D/g,'')}" onclick="event.stopPropagation()">📞 ${c.phone}</a>
          <span class="arrow">▾</span>
        </div>
      </div>
      <div class="card-body">
        <div class="body-grid">
          <div class="body-section">
            <h3>Company Intel</h3>
            <div class="info-row"><span class="lbl">Owner/Contact</span><span class="val">${c.owner}</span></div>
            <div class="info-row"><span class="lbl">Phone</span><span class="val">${c.phone}${c.altPhone ? ' / '+c.altPhone : ''}</span></div>
            <div class="info-row"><span class="lbl">Website</span><span class="val">${c.website}</span></div>
            <div class="info-row"><span class="lbl">Address</span><span class="val">${c.address}</span></div>
            <div class="info-row"><span class="lbl">Founded</span><span class="val">${c.founded}</span></div>
            <div class="info-row"><span class="lbl">Team Size</span><span class="val">${c.teamSize}</span></div>
          </div>
          <div class="body-section">
            <h3>Operations</h3>
            <div class="info-row"><span class="lbl">Hours</span><span class="val">${c.hours}</span></div>
            <div class="info-row"><span class="lbl">Services</span><span class="val">${c.services}</span></div>
            <div class="info-row"><span class="lbl">CRM/Tech</span><span class="val">${c.crm}</span></div>
            <div class="info-row"><span class="lbl">Social</span><span class="val">${c.socialPresence}</span></div>
          </div>
          <div class="rundown">
            <h3>Full Rundown</h3>
            <p>${c.rundown}</p>
          </div>
          <div class="rundown" style="border-left:none">
            <h3 style="color:var(--red)">Pain Points & What They Need</h3>
            <p>${c.painPoints.map(p => '• ' + p).join('<br>')}</p>
          </div>
          <div class="questions-section">
            <h3>Questions to Ask ${c.name.split(' ')[0]}</h3>
            <div class="q-list">
              ${c.questions.map((q,i) => `<div class="q-item"><span class="num">${i+1}.</span>${q}</div>`).join('')}
            </div>
          </div>
          <div class="opener-section">
            <h3>Your Opening Line</h3>
            <div class="opener-box">
              <button class="copy-btn" onclick="event.stopPropagation();navigator.clipboard.writeText(this.nextElementSibling.textContent).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)})">Copy</button>
              <p>${c.opener}</p>
            </div>
          </div>
        </div>
        <div class="status-row">
          <label>Status:</label>
          <select class="status-select">
            <option>Not contacted</option>
            <option>Called — no answer</option>
            <option>Left voicemail</option>
            <option>Sent email</option>
            <option>Booked demo</option>
            <option>Sent proposal</option>
            <option>Closed — client!</option>
            <option>Not interested</option>
            <option>Follow up later</option>
          </select>
          <label>Notes:</label>
          <input class="notes-input" type="text" placeholder="Add notes about this prospect...">
        </div>
      </div>
    </div>
  `).join('');
}

function filterCards(filter, btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderCards(filter);
}
